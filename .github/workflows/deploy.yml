name: Deploy

on:
  # Trigger 1: deploy 브랜치에 push될 때 pyproject.toml 버전이 변경된 경우 자동 실행
  push:
    branches:
      - deploy
    paths:
      - "pyproject.toml"

  # Trigger 2: GitHub UI에서 수동으로 Run workflow 실행
  workflow_dispatch:
    inputs:
      version_override:
        description: "배포 버전 (비워두면 pyproject.toml에서 자동 감지)"
        required: false
        type: string
      environment:
        description: "배포 환경"
        required: true
        type: choice
        default: "production"
        options:
          - production
          - staging
      skip_tests:
        description: "테스트 건너뛰기 (긴급 배포 시)"
        required: false
        type: boolean
        default: false
      create_release:
        description: "GitHub Release 생성"
        required: false
        type: boolean
        default: true

permissions:
  contents: write  # GitHub Release 생성 및 태그 push 권한

jobs:
  # ── Job 1: 버전 변경 감지 ────────────────────────────────────────────────────
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version_changed: ${{ steps.detect-change.outputs.changed }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 전체 히스토리 fetch: 멀티 커밋 push 시 github.event.before 참조에 필요
          fetch-depth: 0

      - name: Get current version
        id: get-version
        run: |
          if [ -n "${{ inputs.version_override }}" ]; then
            VERSION="${{ inputs.version_override }}"
          else
            VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${VERSION}"

      - name: Detect version change (push trigger)
        id: detect-change
        if: github.event_name == 'push'
        run: |
          CURR=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          # github.event.before: push 이전의 SHA (멀티 커밋 push도 정확히 처리)
          BEFORE_SHA="${{ github.event.before }}"

          # 00000... 은 브랜치 최초 push (이전 커밋 없음)
          if echo "${BEFORE_SHA}" | grep -q '^0\{40\}$'; then
            echo "📦 첫 번째 push — 배포 진행"
            echo "prev_version=(none)" >> "$GITHUB_OUTPUT"
            echo "curr_version=${CURR}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            # git diff로 version 라인만 정밀 감지 (다른 라인 변경에 오탐 없음)
            VERSION_DIFF=$(git diff "${BEFORE_SHA}" HEAD -- pyproject.toml \
              | grep '^[+-]version = ' \
              | grep -v '^---\|^+++' || true)

            if [ -n "${VERSION_DIFF}" ]; then
              PREV=$(git show "${BEFORE_SHA}":pyproject.toml 2>/dev/null \
                | grep '^version' | sed 's/version = "\(.*\)"/\1/' || echo "(unknown)")
              echo "✅ Version changed: ${PREV} → ${CURR}"
              echo "prev_version=${PREV}" >> "$GITHUB_OUTPUT"
              echo "curr_version=${CURR}" >> "$GITHUB_OUTPUT"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "⏭️  Version unchanged (${CURR}) — skipping deploy"
              echo "prev_version=${CURR}" >> "$GITHUB_OUTPUT"
              echo "curr_version=${CURR}" >> "$GITHUB_OUTPUT"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Decide whether to deploy
        id: decide
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "수동 실행 — 배포 진행"
          elif [ "${{ steps.detect-change.outputs.changed }}" == "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "버전 변경 감지 — 배포 진행"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "변경 없음 — 배포 건너뜀"
          fi

  # ── Job 2: 테스트 ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_deploy == 'true' && inputs.skip_tests != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full test suite
        run: |
          python -m pytest tests/ -q --tb=short

  # ── Job 3: 빌드 ──────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [check-version, test]
    if: |
      always() &&
      needs.check-version.outputs.should_deploy == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: |
          python -m build
          ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.check-version.outputs.version }}
          path: dist/
          retention-days: 30

  # ── Job 4: GitHub Release 생성 ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: |
      needs.build.result == 'success' &&
      (github.event_name == 'push' || inputs.create_release == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 (태그 생성 등에 필요)

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.check-version.outputs.version }}
          path: dist/

      - name: Set release variables
        id: release-vars
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v${VERSION}"
          ENV="${{ inputs.environment || 'production' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ steps.release-vars.outputs.version }}"
          TAG="${{ steps.release-vars.outputs.tag }}"
          ENV="${{ steps.release-vars.outputs.environment }}"

          cat > release_notes.md << EOF
          ## AN-Web ${TAG}

          **Environment:** ${ENV}
          **Python:** 3.12+

          ### 변경 내용
          $(git log $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s" -- . 2>/dev/null | head -30 || echo "- 초기 릴리스")

          ### 설치

          \`\`\`bash
          pip install an-web==${VERSION}
          \`\`\`

          ### 파일
          | 파일 | 설명 |
          |------|------|
          | \`an_web-${VERSION}-py3-none-any.whl\` | Wheel 패키지 |
          | \`an_web-${VERSION}.tar.gz\` | 소스 배포본 |
          EOF

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create Git tag
        run: |
          TAG="${{ steps.release-vars.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 태그가 이미 존재하면 건너뜀
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping tag creation"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Created and pushed tag: ${TAG}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-vars.outputs.tag }}
          name: "AN-Web ${{ steps.release-vars.outputs.tag }}"
          body_path: release_notes.md
          files: dist/*
          draft: false
          prerelease: ${{ steps.release-vars.outputs.environment == 'staging' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 버전 | ${{ steps.release-vars.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 태그 | ${{ steps.release-vars.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 환경 | ${{ steps.release-vars.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 트리거 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          ls dist/ >> $GITHUB_STEP_SUMMARY
