<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebSearch</title>
</head>
<body>
  <header>
    <a href="/" class="logo">WebSearch</a>
  </header>
  <main>
    <form id="search-form" action="/search" method="get" role="search">
      <input
        id="q"
        type="search"
        name="q"
        placeholder="Search the web..."
        aria-label="Search"
        autocomplete="off"
      >
      <button type="submit" id="search-btn" class="btn-search">Search</button>
    </form>
  </main>
</body>
</html>
